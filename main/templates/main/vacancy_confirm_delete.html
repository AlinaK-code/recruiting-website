{% extends "base.html" %}

{% block title %}Удаление вакансии{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-danger shadow-sm">
                <div class="card-header bg-danger text-white">
                    <h4 class="mb-0">Подтверждение удаления</h4>
                </div>
                <div class="card-body p-4">
                    <p class="lead">Вы уверены, что хотите удалить вакансию?</p>
                    <div class="alert alert-warning">
                        <strong>{{ object.title }}</strong><br>
                        <small class="text-muted">Это действие нельзя отменить.</small>
                    </div>
                    
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-danger btn-lg">Да, удалить навсегда</button>
                            <a href="{% url 'main:vacancy_list' %}" class="btn btn-outline-secondary">Нет, вернуться назад</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
